name: AIUsageToolbar
options:
  bundleIdPrefix: dev.kokonaut
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

# Packages are added once we need them. MenuBarExtraAccess will come back when
# we wire settings windows or popover sizing controls.
packages: {}

targets:
  AIUsageToolbar:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: AIUsageToolbar
        excludes:
          - "Resources/Info.plist"
    resources:
      - AIUsageToolbar/Resources/pricing.json
    info:
      path: AIUsageToolbar/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: AI Usage Toolbar
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.kokonaut.AIUsageToolbar
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AIUsageToolbar/Resources/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  AIUsageToolbarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: AIUsageToolbarTests
    resources:
      - path: AIUsageToolbarTests/Fixtures
        type: folder
    dependencies:
      - target: AIUsageToolbar
      - sdk: XCTest.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.kokonaut.AIUsageToolbarTests
        GENERATE_INFOPLIST_FILE: YES
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(PLATFORM_DIR)/Developer/Library/Frameworks
          - $(SDKROOT)/Developer/Library/Frameworks
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - $(PLATFORM_DIR)/Developer/Library/Frameworks
          - $(SDKROOT)/Developer/Library/Frameworks

schemes:
  AIUsageToolbar:
    build:
      targets:
        AIUsageToolbar: all
        AIUsageToolbarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIUsageToolbarTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
